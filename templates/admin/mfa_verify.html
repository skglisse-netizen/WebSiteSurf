{% extends "base.html" %}

{% block title %}Authentification à deux facteurs | Admin{% endblock %}

{% block content %}
<main class="pt-24 pb-12 flex items-center justify-center min-h-[80vh]">
    <div class="max-w-md w-full mx-4">
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100 p-8 sm:p-10">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-6">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                    </svg>
                </div>
                <h1 class="text-2xl font-bold text-gray-900 mb-2">Double authentification</h1>
                <p class="text-gray-500">Saisissez le code généré par votre application d'authentification.</p>
            </div>

            {% if error %}
            <div class="mb-6 p-4 bg-red-50 border-l-4 border-red-500 text-red-700 text-sm flex items-start animate-shake">
                <svg class="w-5 h-5 mr-3 mt-0.5" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"></path>
                </svg>
                {{ error }}
            </div>
            {% endif %}

            <form action="/admin/login/mfa" method="POST" class="space-y-6">
                <div>
                    <label for="code" class="block text-sm font-semibold text-gray-700 mb-2">Code de sécurité</label>
                    <input type="text" name="code" id="code" required autocomplete="one-time-code" maxlength="6" pattern="[0-9]*" inputmode="numeric"
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition-all text-center tracking-[0.5em] text-2xl font-mono"
                        placeholder="000 000" autofocus>
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-6 rounded-xl transition shadow-lg shadow-blue-500/20 active:scale-[0.98]">
                    Vérifier le code
                </button>
            </form>

            <div class="mt-8 text-center">
                <a href="/admin/login" class="text-sm text-gray-500 hover:text-blue-600 transition">Retour à la connexion classique</a>
            </div>
        </div>
    </div>
</main>

<style>
@keyframes shake {
    0%, 100% { transform: translateX(0); }
    10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
    20%, 40%, 60%, 80% { transform: translateX(5px); }
}
.animate-shake { animation: shake 0.5s ease-in-out; }
</style>
{% endblock %}
